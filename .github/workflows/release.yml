name: Price release

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.price.outputs.tag }}
      version: ${{ steps.price.outputs.version }}
      exists: ${{ steps.release.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - id: price
        run: python scripts/check_price_version.py --hours 24

      - id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ steps.price.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build-cli:
    needs: detect
    if: needs.detect.outputs.exists == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: poe2-price-patcher-windows-x64
            exe: poe2-price-patcher.exe
            ooz: ooz.exe
          - os: macos-14
            artifact: poe2-price-patcher-macos-arm64
            exe: poe2-price-patcher
            ooz: ooz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip pyinstaller beautifulsoup4

      - name: Checkout PyPoE
        uses: actions/checkout@v4
        with:
          repository: OmegaK2/PyPoE
          path: vendor/PyPoE

      - name: Checkout ooz
        uses: actions/checkout@v4
        with:
          repository: zao/ooz
          path: vendor/ooz
          submodules: recursive

      - name: Build ooz
        shell: bash
        run: |
          cmake -S vendor/ooz -B vendor/ooz/build -DCMAKE_BUILD_TYPE=Release
          cmake --build vendor/ooz/build --config Release --target ooz

      - name: Locate ooz
        id: ooz
        shell: bash
        run: |
          found="$(find vendor/ooz/build -type f -name '${{ matrix.ooz }}' | head -n 1)"
          if [ -z "$found" ]; then
            echo "ooz binary not found" >&2
            exit 1
          fi
          echo "path=$found" >> "$GITHUB_OUTPUT"

      - name: Build standalone CLI
        shell: bash
        run: |
          export PYTHONPATH="$PWD/vendor/PyPoE"
          pyinstaller \
            --onefile \
            --name poe2-price-patcher \
            --paths vendor/PyPoE \
            --collect-all PyPoE \
            --add-data "core/resource_map.json:." \
            --add-binary "${{ steps.ooz.outputs.path }}:." \
            core/build_patch.py

      - name: Package
        shell: bash
        run: |
          mkdir -p "release/${{ matrix.artifact }}"
          cp "dist/${{ matrix.exe }}" "release/${{ matrix.artifact }}/"
          cp core/prices.example.json "release/${{ matrix.artifact }}/"
          cp core/resource_map.json "release/${{ matrix.artifact }}/"
          cp README.md "release/${{ matrix.artifact }}/"
          cd release
          python -m zipfile -c "../${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  publish:
    needs:
      - detect
      - build-cli
    if: needs.detect.outputs.exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ needs.detect.outputs.tag }}" artifacts/*.zip \
            --repo "${{ github.repository }}" \
            --title "价格版本 ${{ needs.detect.outputs.version }}" \
            --notes "poecurrency.top 北京时间价格版本：${{ needs.detect.outputs.version }}"
