name: Price release

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}
      version: ${{ steps.price.outputs.version }}
      exists: ${{ steps.release.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - id: price
        run: python scripts/check_price_version.py --hours 24 --version 2

      - id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ steps.price.outputs.tag }}-manual-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ steps.price.outputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ steps.release_tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build-cli:
    needs: detect
    if: needs.detect.outputs.exists == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            gui_artifact: poe2-price-patcher-gui-windows-x64
            exe: poe2-price-patcher.exe
            ooz: ooz.exe
          - os: macos-14
            gui_artifact: poe2-price-patcher-gui-macos-arm64
            exe: poe2-price-patcher
            ooz: ooz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip pyinstaller beautifulsoup4 fnvhash configobj brotli

      - name: Install GUI dependencies
        run: npm ci

      - name: Checkout PyPoE
        uses: actions/checkout@v4
        with:
          repository: OmegaK2/PyPoE
          path: vendor/PyPoE

      - name: Checkout ooz
        uses: actions/checkout@v4
        with:
          repository: zao/ooz
          path: vendor/ooz
          submodules: recursive

      - name: Build ooz
        shell: bash
        run: |
          cmake -S vendor/ooz -B vendor/ooz/build -DCMAKE_BUILD_TYPE=Release
          cmake --build vendor/ooz/build --config Release --target ooz

      - name: Locate ooz
        id: ooz
        shell: bash
        run: |
          found="$(find vendor/ooz/build -type f -name '${{ matrix.ooz }}' | head -n 1)"
          if [ -z "$found" ]; then
            echo "ooz binary not found" >&2
            exit 1
          fi
          echo "path=$found" >> "$GITHUB_OUTPUT"

      - name: Build standalone CLI
        shell: bash
        run: |
          export PYTHONPATH="$PWD/vendor/PyPoE"
          pyinstaller \
            --onefile \
            --name poe2-price-patcher \
            --paths vendor/PyPoE \
            --collect-all PyPoE \
            --hidden-import fnvhash \
            --exclude-module cffi \
            --exclude-module pkg_resources \
            --exclude-module setuptools \
            --add-data "core/resource_map.json:." \
            --add-binary "${{ steps.ooz.outputs.path }}:." \
            core/build_baseitemtypes_patch.py

      - name: Prepare GUI core
        shell: bash
        run: |
          cp "dist/${{ matrix.exe }}" "core/${{ matrix.exe }}"
          chmod +x "core/${{ matrix.exe }}" || true

      - name: Build GUI
        shell: bash
        run: |
          npm run tauri -- build

      - name: Package GUI
        shell: bash
        run: |
          mkdir -p gui-release
          if [ "${{ runner.os }}" = "macOS" ]; then
            cd "src-tauri/target/release/bundle/macos"
            ditto -c -k --sequesterRsrc --keepParent "POE2 Price Patcher.app" "../../../../../${{ matrix.gui_artifact }}.zip"
          else
            mkdir -p "gui-release/${{ matrix.gui_artifact }}"
            cp "src-tauri/target/release/poe2-price-patcher-gui.exe" "gui-release/${{ matrix.gui_artifact }}/"
            mkdir -p "gui-release/${{ matrix.gui_artifact }}/core"
            cp "core/${{ matrix.exe }}" "gui-release/${{ matrix.gui_artifact }}/core/"
            cp core/prices.example.json "gui-release/${{ matrix.gui_artifact }}/core/"
            cp core/resource_map.json "gui-release/${{ matrix.gui_artifact }}/core/"
            cd gui-release
            python -m zipfile -c "../${{ matrix.gui_artifact }}.zip" "${{ matrix.gui_artifact }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.gui_artifact }}
          path: ${{ matrix.gui_artifact }}.zip

  publish:
    needs:
      - detect
      - build-cli
    if: needs.detect.outputs.exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ needs.detect.outputs.tag }}" artifacts/*.zip \
            --repo "${{ github.repository }}" \
            --title "价格版本 ${{ needs.detect.outputs.version }}" \
            --notes "poecurrency.top 北京时间价格版本：${{ needs.detect.outputs.version }}"
